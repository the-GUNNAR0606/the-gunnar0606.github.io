<!DOCTYPE html>
<html>
 <head>
   <title>Calculator</title>
 </head>
 <body>
   <style>

     * {
       margin: 0;
       padding: 0;
       background-color: rgb(92, 53, 94);
     }

     body {
       display: flex;
       min-height: 100dvh;
       align-items: center;
       justify-content: center;
     }

     #calculator {
       display: grid;
       max-width : fit-content;
       height: fit-content;
       grid-template-columns: repeat(4, 1fr);
       gap: .10rem;
       background-color: rgb(43, 54, 65);
       padding: 10px;
       border-radius: 10px;
       padding-top: 15px;
       padding-bottom: 15px;
     }


     #calculator * {
       width : 4rem;
       height: 4rem;
       font: 2rem monospace;


       border-radius: .5rem;
     }

     #calculator button {
      background-color: rgb(92, 92, 92);  
     }

     #calculator button:hover {
       background: rgb(132, 129, 129);
     }

     #calculator #display {
      grid-column-start: 1;
      grid-column-end: 5;
       padding: .25rem;
       text-align: right;
       width:16.3rem;
       box-sizing: border-box;
       background: rgb(119, 114, 114);
       border: 2px solid rgb(74, 87, 83);
       overflow-x: auto;
     }

     #calculator #go {
       grid-column-start: 4;
       grid-row-start: 5;
       grid-row-end  : 7;
       width : 100%;
       height: 100%;
     }
     #calculator h1 {
      grid-column-start: 1;
      grid-column-end: 5;
      text-align: center;
      width: 100%;
      color: rgb(90, 89, 89);
      background-color:rgb(43, 54, 65);
     }
  </style>

   <div id="calculator">
     <h1>calculator</h1>
     <div id="display">0</div>

     <button id="7">7</button>
     <button id="8">8</button>
     <button id="9">9</button>
     <button id="sub">-</button>


     <button id="4">4</button>
     <button id="5">5</button>
     <button id="6">6</button>
     <button id="add">+</button>


     <button id="1">1</button>
     <button id="2">2</button>
     <button id="3">3</button>
     <button id="go">=</button>


     <button id="c">C</button>
     <button id="0">0</button>
     <button id="dot">.</button>
   </div>

   <script>
     const display = document.getElementById("display")
    
     const _0 = document.getElementById("0")
     const _1 = document.getElementById("1")
     const _2 = document.getElementById("2")
     const _3 = document.getElementById("3")
     const _4 = document.getElementById("4")
     const _5 = document.getElementById("5")
     const _6 = document.getElementById("6")
     const _7 = document.getElementById("7")
     const _8 = document.getElementById("8")
     const _9 = document.getElementById("9")


     const add = document.getElementById("add")
     const sub = document.getElementById("sub")
     const dot = document.getElementById("dot")
     const go  = document.getElementById("go" )
     const c   = document.getElementById("c"  )

     function onNumberClicked(e) {
       console.log(e.target.innerText)
       if (display.innerText === "0")
        display.innerText =                     e.target.innerText
      else
        display.innerText = display.innerText + e.target.innerText
     }

     _0.onclick = onNumberClicked
     _1.onclick = onNumberClicked
     _2.onclick = onNumberClicked
     _3.onclick = onNumberClicked
     _4.onclick = onNumberClicked
     _5.onclick = onNumberClicked
     _6.onclick = onNumberClicked
     _7.onclick = onNumberClicked
     _8.onclick = onNumberClicked
     _9.onclick = onNumberClicked
     add.onclick = onNumberClicked
     sub.onclick = onNumberClicked
     dot.onclick = onNumberClicked

     function onGoClicked(e){
       console.log("nice numbers you have there")

      eval(display.innerText)
      display.innerText = eval(display.innerText)
     }

    function Fire(e){
      console.log("hey, you cleared your numbers, now you should like, play Roblox GRACE")
      display.innerText = "0" 
     }

     go.onclick = onGoClicked
     c.onclick = Fire

   </script>
 </body>
</html>
